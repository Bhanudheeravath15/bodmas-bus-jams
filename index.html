<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BODMAS Bus Jam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>BODMAS Bus Jam 🚍</h1>
<p>Enter your own expression and solve using BODMAS</p>

<!-- USER INPUT -->
<div>
  <input type="number" id="n1" placeholder="Number">
  <select id="op1">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">×</option>
    <option value="/">÷</option>
  </select>

  <input type="number" id="n2" placeholder="Number">
  <select id="op2">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">×</option>
    <option value="/">÷</option>
  </select>

  <input type="number" id="n3" placeholder="Number">
</div>

<br>
<button onclick="generateExpression()">Generate Expression</button>

<!-- GAME AREA -->
<div id="expression"></div>

<p id="message"></p>
<button onclick="resetGame()">Reset</button>

<script src="script.js"></script>
</body>
</html>
